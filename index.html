<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Révisions Bac Français</title>

<style>

body {
    margin:0;
    font-family: Georgia, serif;
    background:#f4f4f4;
}

#home {
    padding:30px;
}

h1 {
    text-align:center;
}

/* CARTE ACCUEIL */
.card {
    <div class="card" onclick="openText('texte1')">
    <div class="card-title">
        <strong>Texte 1</strong> – Pour un oui ou pour un non, scène d’ouverture
    </div>
    <div class="card-sub">
        Nathalie Sarraute, 1981
    </div>
</div>
}

.card-title {
    font-size:18px;
}

.card-title strong {
    font-weight:bold;
}

.card-subtitle {
    font-size:14px;
    color:gray;
    margin-top:5px;
}

/* LECTURE */
#viewer {
    display:none;
    padding:40px;
    max-width:900px;
    margin:auto;
    background:white;
    min-height:100vh;
}

#lineText {
    line-height:2.2; /* espace global */
    font-size:18px;
}

/* LIGNES */
.line {
    padding:8px 0;
    cursor:pointer;
}

.line:hover {
    background:#fff3a0;
}

/* ANALYSE */
.analysis {
    display:none;
    color:#c0392b;
    margin:5px 0 15px 20px;
    font-size:0.95em;
}

/* BOUTON */
button {
    margin-bottom:20px;
    padding:10px 15px;
    border:none;
    background:black;
    color:white;
    cursor:pointer;
}

.card-title {
    font-size:18px;
}

.card-title strong {
    font-weight:bold;
}

.card-sub {
    font-size:14px;
    color:#666;
    margin-top:5px;
}

</style>

</head>

<body>

<div id="home">
<h1>Révisions Bac Français</h1>

<div class="card" onclick="openText('texte1')">
    <div class="card-title">
        <strong>Texte 1</strong> – Pour un oui ou pour un non, scène d’ouverture
    </div>
    <div class="card-subtitle">
        Nathalie Sarraute, 1981
    </div>
</div>

</div>

<div id="viewer">
<button onclick="back()">← Retour</button>

<div id="lineText"></div>

</div>

<script>

const textes = {

texte1: [
{
text: "H.I : Ecoute, je voulais te demander…C’est un peu pour ça que je suis venu…je voudrais savoir…que s’est-il passé ? Qu’est-ce que tu as contre moi ?",
analysis: "Entrée in medias res : H.I exprime une inquiétude immédiate. Les nombreuses hésitations (points de suspension) traduisent un malaise et une difficulté à formuler clairement le problème."
},
{
text: "H.2 : Mais rien…Pourquoi ?",
analysis: "Réponse brève et évasive. Le refus d'explication contraste avec l’insistance de H.I, ce qui crée une tension dramatique."
},
{
text: "H.I : Oh, je ne sais pas…Il me semble que tu t’éloignes…tu ne fais plus jamais signe…il faut toujours que ce soit moi…",
analysis: "Accumulation de reproches implicites. Le langage reste flou (“il me semble”) : Sarraute met en scène une communication incertaine."
},
{
text: "H.2 : Tu sais bien : je prends rarement l’initiative, j’ai peur de déranger.",
analysis: "Justification rationnelle. H.2 tente de banaliser la situation en invoquant un trait de caractère."
},
{
text: "H.I : Mais pas avec moi ? Tu sais que je te dirais… Nous n’en sommes tout de même pas là…Non, je sens qu’il y a quelque chose…",
analysis: "Refus de l’explication logique. H.I insiste sur un ressenti, montrant que le conflit est affectif plus que rationnel."
},
{
text: "H.2 : Mais que veux-tu qu’il y ait ?",
analysis: "Déni. Question rhétorique qui ferme le dialogue."
},
{
text: "H.I : C’est justement ce que je me demande. J’ai beau chercher…jamais…depuis tant d’années…il n’y a jamais rien eu entre nous… rien dont je me souvienne…",
analysis: "Insistance sur la durée (“tant d’années”). Le paradoxe apparaît : une rupture sans cause identifiable."
},
{
text: "H.2 : Moi, par contre, il y a des choses que je n’oublie pas. Tu as toujours été très chic… il y a eu des circonstances…",
analysis: "Première fissure : H.2 suggère l’existence d’un événement, sans le nommer. Suspense."
},
{
text: "H.I : Oh qu’est-ce que c’est ? Toi aussi, tu as toujours été parfait…un ami sûr…",
analysis: "Refus d’envisager un conflit réel. H.I idéalise leur relation."
},
{
text: "H.2 : Oui…Elle t’aimait bien…\"un vrai copain\"...",
analysis: "Appui sur la figure maternelle : valeur morale de l’amitié."
},
{
text: "H.I : Alors ?",
analysis: "Relance dramatique : attente d’une révélation."
},
{
text: "H.2 : …Alors…que veux-tu que je te dise !",
analysis: "Échec du langage : incapacité à formuler."
},
{
text: "H.I : Si, dis-moi…il y a quelque chose de changé…",
analysis: "H.I perçoit une rupture invisible → thème central : l’infra-ordinaire."
},
{
text: "H.2 : Mais moi aussi, figure-toi…",
analysis: "Renversement : le malaise est partagé."
},
{
text: "H.2 : Que veux-tu…je t’aime tout autant…mais c’est plus fort que moi…",
analysis: "Paradoxe : amour + rupture. L’émotion échappe à la volonté."
},
{
text: "H.2 : C’est…c’est plutôt que ce n’est rien…",
analysis: "Notion clé : le “rien”. Sarraute montre que les conflits naissent de micro-événements imperceptibles."
},
{
text: "H.2 : Eh bien, c’est juste des mots…",
analysis: "Révélation centrale : le langage est à l’origine du conflit."
},
{
text: "H.2 : Des mots qu’on n’a pas « eus »…",
analysis: "Concept sarrautien : les mots inconscients, non maîtrisés."
},
{
text: "H.2 : Et c’est à cause de ce rien…",
analysis: "Conclusion paradoxale : une rupture majeure née d’un détail insignifiant."
},
{
text: "H.2 : Oui…C’est à cause de ça…Tu ne comprendras jamais…",
analysis: "Fin pessimiste : impossibilité de comprendre → échec définitif de la communication."
}
]

};

function openText(id){
document.getElementById("home").style.display="none";
document.getElementById("viewer").style.display="block";

let html = "";

textes[id].forEach((line, i) => {
html += `<div class="line" onclick="toggle(${i})">${line.text}</div>`;
html += `<div class="analysis" id="a${i}">${line.analysis}</div>`;
});

document.getElementById("lineText").innerHTML = html;
}

function toggle(i){
let el = document.getElementById("a"+i);
el.style.display = el.style.display === "block" ? "none" : "block";
}

function back(){
document.getElementById("home").style.display="block";
document.getElementById("viewer").style.display="none";
}

</script>

</body>
</html>
