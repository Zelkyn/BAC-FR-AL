<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Révisions Bac Français</title>

<style>

body {
    margin:0;
    font-family: "Georgia", serif;
    background:#f9f9f9;
    color:#222;
}

#home {
    padding:30px;
}

h1 {
    text-align:center;
}

.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
}

.card {
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    cursor:pointer;
    transition:0.2s;
}

.card:hover {
    transform:scale(1.03);
}

#viewer {
    display:none;
    padding:40px;
    max-width:800px;
    margin:auto;
    background:white;
    min-height:100vh;
}

.line {
    margin:10px 0;
    cursor:pointer;
}

.line:hover {
    background:#fff3a0;
}

.analysis {
    display:none;
    color:#c0392b;
    margin-left:20px;
    font-size:0.95em;
}

button {
    margin:10px;
    padding:10px 15px;
    border:none;
    background:black;
    color:white;
    cursor:pointer;
}

</style>

</head>

<body>

<div id="home">
<h1>Révisions Bac Français</h1>

<div class="grid">
<div class="card" onclick="openText()">Dom Juan - Molière</div>
</div>

</div>

<div id="viewer">
<button onclick="back()">Retour</button>
<button onclick="toggleGlobal()">Analyse globale</button>

<div id="text"></div>
<div id="global" style="display:none; color:#c0392b; margin-top:20px;"></div>

</div>

<script>

const textData = [
{
line: "Je veux savoir un peu vos pensées à fond.",
analysis: "Sganarelle initie le débat philosophique."
},
{
line: "Je crois que deux et deux sont quatre.",
analysis: "Dom Juan affirme un rationalisme provocateur."
}
];

function openText(){
document.getElementById("home").style.display="none";
document.getElementById("viewer").style.display="block";

let html="";
textData.forEach((l,i)=>{
html += `<div class="line" onclick="toggle(${i})">${l.line}</div>`;
html += `<div class="analysis" id="a${i}">${l.analysis}</div>`;
});

document.getElementById("text").innerHTML = html;
document.getElementById("global").innerText = "Opposition entre foi et raison.";
}

function toggle(i){
let el = document.getElementById("a"+i);
el.style.display = el.style.display === "block" ? "none" : "block";
}

function toggleGlobal(){
let g = document.getElementById("global");
g.style.display = g.style.display === "block" ? "none" : "block";
}

function back(){
document.getElementById("home").style.display="block";
document.getElementById("viewer").style.display="none";
}

</script>

</body>
</html>
