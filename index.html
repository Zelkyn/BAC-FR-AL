function openText(id){
document.getElementById("home").style.display="none";
document.getElementById("viewer").style.display="block";

let html = "";

textes[id].forEach((line, i) => {
html += `<div class="line" onclick="toggle(${i})">${line.text}</div>`;
html += `<div class="analysis" id="a${i}">${line.analysis}</div>`;
});

document.getElementById("lineText").innerHTML = html;
}

function toggle(i){
let el = document.getElementById("a"+i);
el.style.display = el.style.display === "block" ? "none" : "block";
}

function back(){
